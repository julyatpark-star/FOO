<style>
  html, body { font-family: 'Pretendard', system-ui, -apple-system, 'Apple SD Gothic Neo', sans-serif; -webkit-font-smoothing: antialiased; }
  body { background: #f6f7fb; }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  .phone-frame { background: #0f172a; padding: 8px; box-shadow: 0 24px 64px -20px rgba(15, 23, 42, 0.25), 0 0 0 1px #1e293b; border-radius: 44px; }
  .phone-screen { border-radius: 32px; overflow: hidden; background: #ffffff; width: 100%; height: 100%; position: relative; }
  .grad-primary { background-image: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 50%, #6d28d9 100%); }
  .grad-soft { background-image: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); }
  .grad-card { background-image: linear-gradient(135deg, rgba(124,58,237,0.07) 0%, rgba(139,92,246,0.04) 100%); }
  .text-grad { background-image: linear-gradient(90deg, #7c3aed, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lime-chip { background: #ecfccb; color: #3f6212; }
  .dot-pattern { background-image: radial-gradient(rgba(15,23,42,0.06) 1px, transparent 1px); background-size: 16px 16px; }
  .shadow-soft { box-shadow: 0 6px 20px -8px rgba(15,23,42,0.12); }
  .shadow-pop { box-shadow: 0 20px 50px -20px rgba(124,58,237,0.35); }
  .scroll-smooth { scroll-behavior: smooth; }
  .ring-brand { box-shadow: 0 0 0 4px rgba(124,58,237,0.12); }
  .fade-in { animation: fadeIn 220ms ease-out both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: none;} }
  .progress-stripe { background: repeating-linear-gradient(45deg, #ecfccb 0 8px, #d9f99d 8px 16px); }
  @keyframes splashRise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .splash-rise { animation: splashRise 700ms ease-out both; }
  .splash-rise-delay { animation: splashRise 700ms ease-out 250ms both; }
  @keyframes popoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .popo-float { animation: popoFloat 3s ease-in-out infinite; }

const Chip = ({ children, color = "indigo", active = false, onClick, size = "md", variant = "solid" }) => {
  // solid: 채워진 시맨틱 컬러 (카테고리, 핵심 상태)
  // outline: 보더만 (메타정보, 스킬, 필터 등 부수적 라벨)
  const solidMap = {
    indigo: active ? "bg-violet-600 text-white" : "bg-violet-50 text-violet-700",
    rose: active ? "bg-rose-500 text-white" : "bg-rose-50 text-rose-700",
    amber: active ? "bg-amber-500 text-white" : "bg-amber-50 text-amber-700",
    sky: active ? "bg-sky-500 text-white" : "bg-sky-50 text-sky-700",
    slate: active ? "bg-slate-800 text-white" : "bg-slate-100 text-slate-700",
    emerald: active ? "bg-emerald-500 text-white" : "bg-emerald-50 text-emerald-700",
    violet: active ? "bg-violet-600 text-white" : "bg-violet-50 text-violet-700",
    // lime은 emerald와 의미가 중복되어 alias로 fallback
    lime: active ? "bg-emerald-500 text-white" : "bg-emerald-50 text-emerald-700",
  };
  const outlineMap = {
    indigo: active ? "border-violet-600 text-violet-700 bg-white" : "border-slate-200 text-slate-500 bg-white",
    rose: active ? "border-rose-500 text-rose-700 bg-white" : "border-slate-200 text-slate-500 bg-white",
    amber: active ? "border-amber-500 text-amber-700 bg-white" : "border-slate-200 text-slate-500 bg-white",
    sky: active ? "border-sky-500 text-sky-700 bg-white" : "border-slate-200 text-slate-500 bg-white",
    slate: active ? "border-slate-700 text-slate-800 bg-white" : "border-slate-200 text-slate-500 bg-white",
    emerald: active ? "border-emerald-500 text-emerald-700 bg-white" : "border-slate-200 text-slate-500 bg-white",
    violet: active ? "border-violet-600 text-violet-700 bg-white" : "border-slate-200 text-slate-500 bg-white",
    lime: active ? "border-emerald-500 text-emerald-700 bg-white" : "border-slate-200 text-slate-500 bg-white",
  };
  const colorMap = variant === "outline" ? outlineMap : solidMap;
  const sizeMap = { sm: "text-[11px] px-2 py-0.5", md: "text-xs px-2.5 py-1", lg: "text-sm px-3 py-1.5" };
  // outline 보더를 1px로
  const borderClass = variant === "outline" ? "border" : "";
  const weightClass = variant === "outline" && active ? "font-bold" : "font-semibold";
  return (
    <button onClick={onClick} className={`rounded-full ${weightClass} ${colorMap[color]} ${sizeMap[size]} ${borderClass} transition`}>
      {children}
    </button>
  );
};

const Btn = ({ children, onClick, variant = "primary", size = "md", className = "", icon, full = false, disabled = false }) => {
  const variants = {
    primary: "bg-slate-900 text-white hover:bg-slate-800",
    brand: "grad-primary text-white hover:opacity-95 shadow-pop",
    lime: "bg-lime-400 text-slate-900 hover:bg-lime-300",
    ghost: "bg-white text-slate-900 hover:bg-slate-50 border border-slate-200",
    softInd: "bg-violet-50 text-violet-700 hover:bg-violet-100",
    danger: "bg-rose-500 text-white hover:bg-rose-600",
    outline: "bg-transparent text-slate-700 border border-slate-300 hover:bg-slate-50",
  };
  const sizes = { sm: "text-xs px-3 py-1.5", md: "text-sm px-4 py-2.5", lg: "text-base px-5 py-3" };
  return (
    <button onClick={onClick} disabled={disabled}
      className={`inline-flex items-center justify-center gap-1.5 rounded-xl font-semibold transition ${variants[variant]} ${sizes[size]} ${full ? "w-full" : ""} ${disabled ? "opacity-50 cursor-not-allowed" : ""} ${className}`}>
      {icon && <Icon name={icon} size={size === "lg" ? 18 : 16} />}
      {children}
    </button>
  );
};

const Card = ({ children, className = "", onClick }) => (
  <div onClick={onClick} className={`bg-white rounded-2xl border border-slate-200/70 ${onClick ? "cursor-pointer hover:border-slate-300 hover:shadow-soft transition" : ""} ${className}`}>
    {children}
  </div>
);

const Stat = ({ label, value, accent, bare = false }) => (
  <div className={bare ? "px-3 py-1 border-l border-slate-200 first:border-l-0" : "px-2.5 py-3 rounded-xl bg-white border border-slate-200/70"}>
    <div className="text-[11px] font-semibold text-slate-500 tracking-tight whitespace-nowrap">{label}</div>
    <div className={`mt-0.5 text-xl font-extrabold ${accent || "text-slate-900"}`}>{value}</div>
  </div>
);

const Avatar = ({ name = "FOO", color = "indigo", size = 36, ring = false }) => {
  const colorMap = {
    indigo: "bg-violet-100 text-violet-700",
    rose: "bg-rose-100 text-rose-700",
    amber: "bg-amber-100 text-amber-700",
    emerald: "bg-emerald-100 text-emerald-700",
    sky: "bg-sky-100 text-sky-700",
    violet: "bg-violet-100 text-violet-700",
  };
  return (
    <div style={{ width: size, height: size }} className={`shrink-0 rounded-full font-bold flex items-center justify-center ${colorMap[color]} ${ring ? "ring-2 ring-white" : ""}`}>
      <span style={{ fontSize: size * 0.42 }}>{name.slice(0, 1)}</span>
    </div>
  );
};

const Progress = ({ value, color = "indigo" }) => {
  const map = { indigo: "bg-violet-500", lime: "bg-lime-400", rose: "bg-rose-500", amber: "bg-amber-500", emerald: "bg-emerald-500" };
  return (
    <div className="h-1.5 w-full rounded-full bg-slate-100 overflow-hidden">
      <div className={`h-full rounded-full ${map[color]}`} style={{ width: `${value}%` }} />
    </div>
  );
};

      {sub && <div className="text-xs text-slate-500 mt-0.5">{sub}</div>}

function App() {
  const [route, setRoute] = useState({ view: "splash" });
  const [studentTab, setStudentTab] = useState("home");
  const [companyTab, setCompanyTab] = useState("dashboard");
  const [bookmarks, setBookmarks] = useState(new Set(["p2"]));
  const [appliedIds, setAppliedIds] = useState(new Set());
  const [toast, setToast] = useState(null);

  const pushToast = (text) => {
    setToast(text);
    setTimeout(() => setToast(null), 2500);
  };

  const go = (view, extra = {}) => setRoute({ view, ...extra });

  // 스플래시 → 온보딩 자동 이동 (1.5초)
  useEffect(() => {
    if (route.view === "splash") {
      const t = setTimeout(() => setRoute({ view: "onboarding" }), 1500);
      return () => clearTimeout(t);
    }
  }, [route.view]);

  // 단축키 정의 (발표 모드용)
  const shortcuts = useMemo(() => [
    { key: "1", label: "스플래시",    action: () => go("splash") },
    { key: "2", label: "온보딩",      action: () => go("onboarding") },
    { key: "3", label: "학생 홈",     action: () => { setStudentTab("home"); go("student-home"); } },
    { key: "4", label: "둘러보기",    action: () => { setStudentTab("explore"); go("student-home"); } },
    { key: "5", label: "프로젝트 상세", action: () => go("student-project-detail", { projectId: "p2" }) },
    { key: "6", label: "워크스페이스", action: () => go("student-workspace") },
    { key: "7", label: "잡 시뮬",     action: () => go("student-simulation-list") },
    { key: "8", label: "마이",        action: () => { setStudentTab("me"); go("student-home"); } },
    { key: "9", label: "기업 포털",   action: () => go("company-dashboard") },
  ], []);

  // 키보드 단축키 (1-9)
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
      const sc = shortcuts.find(s => s.key === e.key);
      if (sc) { e.preventDefault(); sc.action(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [shortcuts]);

  return (
    <div className="min-h-screen text-slate-900">
      {route.view === "splash" && (
        <DemoStage shortcuts={shortcuts} route={route} go={go} currentMode="splash">
          <PhoneShell hideStatusBar>
            <SplashScreen />
          </PhoneShell>
        </DemoStage>
      )}
      {route.view === "onboarding" && (
        <DemoStage shortcuts={shortcuts} route={route} go={go} currentMode="onboarding">
          <PhoneShell>
            <OnboardingScreen go={go} />
          </PhoneShell>
        </DemoStage>
      )}
      {route.view.startsWith("student") && (
        <DemoStage shortcuts={shortcuts} route={route} go={go} currentMode="student">
          <PhoneShell>
            <StudentApp
              route={route} go={go}
              tab={studentTab} setTab={setStudentTab}
              bookmarks={bookmarks} setBookmarks={setBookmarks}
              appliedIds={appliedIds} setAppliedIds={setAppliedIds}
              pushToast={pushToast}
            />
          </PhoneShell>
        </DemoStage>
      )}
      {route.view.startsWith("company") && (
        <DemoStage shortcuts={shortcuts} route={route} go={go} currentMode="company">
          <DesktopShell>
            <CompanyApp route={route} go={go} tab={companyTab} setTab={setCompanyTab} pushToast={pushToast} />
          </DesktopShell>
        </DemoStage>
      )}
      <Toast text={toast} />
    </div>
  );
}

function StudentApp({ route, go, tab, setTab, bookmarks, setBookmarks, appliedIds, setAppliedIds, pushToast }) {
  const isDetail = route.view === "student-project-detail";
  const isWorkspace = route.view === "student-workspace";
  const isSimList = route.view === "student-simulation-list";
  const isSimDetail = route.view === "student-simulation-detail";
  const isSimPlay = route.view === "student-simulation-play";
  const isPoints = route.view === "student-points";

  if (isDetail) {
    return <StudentProjectDetail
      go={go} projectId={route.projectId} bookmarks={bookmarks} setBookmarks={setBookmarks}
      appliedIds={appliedIds} setAppliedIds={setAppliedIds} pushToast={pushToast}
    />;
  }
  if (isWorkspace) {
    return <StudentWorkspace go={go} pushToast={pushToast} />;
  }
  if (isSimList) {
    return <SimulationList go={go} />;
  }
  if (isSimDetail) {
    return <SimulationDetail go={go} simId={route.simId} />;
  }
  if (isSimPlay) {
    return <SimulationPlay go={go} simId={route.simId} pushToast={pushToast} />;
  }
  if (isPoints) {
    return <StudentPoints go={go} pushToast={pushToast} />;
  }

  return (
    <div className="relative h-full">
      <div className="h-full overflow-y-auto pb-24 scrollbar-hide">
        {tab === "home" && <StudentHome go={go} setTab={setTab} bookmarks={bookmarks} setBookmarks={setBookmarks} />}
        {tab === "explore" && <StudentExplore go={go} bookmarks={bookmarks} setBookmarks={setBookmarks} />}
        {tab === "mine" && <StudentMine go={go} />}
        {tab === "portfolio" && <StudentPortfolio />}
        {tab === "me" && <StudentMe go={go} />}
      </div>
      <StudentTabBar tab={tab} setTab={setTab} />

  );
}

/* ============================================================

============================================================ */
const AdBanner = ({ go, setTab }) => {
  const [idx, setIdx] = useState(0);
  const [paused, setPaused] = useState(false);

  useEffect(() => {
    if (paused) return;
    const t = setInterval(() => setIdx((i) => (i + 1) % AD_BANNERS.length), 4500);
    return () => clearInterval(t);
  }, [paused]);

  const colorMap = {
    indigo: "from-violet-500 to-violet-700",
    rose: "from-rose-500 to-pink-600",
    emerald: "from-emerald-500 to-teal-600",
    amber: "from-amber-500 to-orange-500",
    sky: "from-sky-500 to-blue-600",
    violet: "from-violet-500 to-purple-600",
  };

  const handleClick = (a) => {
    if (a.target.type === "project") {
      go("student-project-detail", { projectId: a.target.id });
    } else if (a.target.type === "simulation") {
      go("student-simulation-detail", { simId: a.target.id });
    }
  };

  const prev = (e) => {
    e.stopPropagation();
    setPaused(true);
    setIdx((i) => Math.max(0, i - 1));
  };
  const next = (e) => {
    e.stopPropagation();
    setPaused(true);
    setIdx((i) => Math.min(AD_BANNERS.length - 1, i + 1));
  };

  return (
    <div className="px-5">
      <div className="relative rounded-2xl overflow-hidden h-24 shadow-soft">
        {AD_BANNERS.map((a, i) => {
          const comp = COMPANIES[a.company];
          return (
            <button
              key={a.id}
              onClick={() => handleClick(a)}

  );

    <div className="relative">

  const [filters, setFilters] = useState({ team: false, hire: false });

  const filtered = useMemo(() => PROJECTS.filter((p) => {
    if (cat !== "all" && p.cat !== cat) return false;
    if (filters.team && !p.team) return false;

    <div className="fade-in">

const SimulationPlay = ({ go, simId, pushToast }) => {
  const s = SIMULATIONS.find(x => x.id === simId) || SIMULATIONS[0];
  const c = CATEGORIES.find(x => x.id === s.cat);
  const [step, setStep] = useState(0); // task index
  const [phase, setPhase] = useState("work"); // "work" | "review" | "done"
  const [answers, setAnswers] = useState({});
  const [gaps, setGaps] = useState({}); // task별 '차이 메모'

  const totalSteps = s.tasks.length;
  const task = s.tasks[step];
  const myAnswer = answers[task?.id] || "";
  const myGap = gaps[task?.id] || "";

  const setMyAnswer = (v) => setAnswers({ ...answers, [task.id]: v });
  const setMyGap = (v) => setGaps({ ...gaps, [task.id]: v });

  // 제출: 빈 답안일 경우 sampleAnswer 자동 입력
  const onSubmit = () => {
    if (!myAnswer.trim() && task.sampleAnswer) {
      setAnswers({ ...answers, [task.id]: task.sampleAnswer });
    }
    setPhase("review");
  };

  const onNext = () => {
    if (step < totalSteps - 1) {
      setStep(step + 1);
      setPhase("work");
    } else {
      setPhase("done");

  };

    return (

    { id: "t1", label: "포트폴리오 추가 요청", text: `안녕하세요 ${applicant.name}님, 비포레 채용 담당자입니다. 지원해주신 내용 잘 보았고, 가능하시다면 최근 진행하셨던 모바일 디자인 작업물 1~2건을 추가로 공유해주실 수 있을까요?` },
    { id: "t2", label: "간단 인터뷰 제안", text: `안녕하세요 ${applicant.name}님, 비포레입니다. 지원서가 인상적이어서 본 프로젝트 시작 전에 30분 정도 화상 미팅으로 짧게 인사 나누고 싶습니다. 가능한 시간대를 알려주실 수 있을까요?` },
    { id: "t3", label: "감사 + 보류 안내", text: `안녕하세요 ${applicant.name}님, 정성스러운 지원에 감사드립니다. 현재 다른 지원자분들도 검토 중이라 결과 안내까지 며칠 더 소요될 예정입니다. 양해 부탁드립니다.` },
  ];

  const [text, setText] = useState("");
  const [activeTemplate, setActiveTemplate] = useState(null);

  const useTemplate = (t) => {
    setText(t.text);
    setActiveTemplate(t.id);
  };

  return (
    <div className="fixed inset-0 z-50 bg-slate-900/50 flex items-center justify-center p-6 fade-in" onClick={onClose}>
      <div className="bg-white w-full max-w-xl rounded-2xl shadow-pop" onClick={(e) => e.stopPropagation()}>
        {/* 헤더 */}
        <div className="p-5 border-b border-slate-100 flex items-start gap-3">
          <Avatar name={applicant.name} color="indigo" size={44} />
          <div className="flex-1">
            <div className="font-extrabold text-slate-900">{applicant.name}님에게 메시지</div>
            <div className="text-xs text-slate-500 mt-0.5">{applicant.school} · 평균 응답 4시간</div>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center">
            <Icon name="x" size={16} />
          </button>
        </div>

        {/* 본문 */}
        <div className="p-5">
          {/* 빠른 답장 템플릿 */}
          <div className="text-xs font-semibold text-slate-700 mb-2">빠른 답장</div>
          <div className="flex gap-2 flex-wrap">
            {templates.map((t) => (
              <button key={t.id} onClick={() => useTemplate(t)}
                className={`text-xs px-3 py-1.5 rounded-full font-semibold transition ${activeTemplate === t.id ? "bg-violet-600 text-white" : "bg-slate-100 text-slate-700 hover:bg-slate-200"}`}>
                {t.label}
              </button>
            ))}
          </div>

          {/* 입력 */}
          <div className="mt-4">
            <div className="text-xs font-semibold text-slate-700 mb-2">메시지</div>
            <textarea
              value={text}
              onChange={(e) => { setText(e.target.value); setActiveTemplate(null); }}
              placeholder="메시지를 입력하세요. 템플릿을 누르면 빠르게 작성할 수 있어요."
              rows={6}
              className="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-200 resize-none"
            />
            <div className="mt-1 flex justify-between items-center">
              <button className="text-[11px] text-slate-500 hover:text-slate-700 flex items-center gap-1">
                <Icon name="upload" size={12} />파일 첨부
              </button>
              <span className="text-[11px] text-slate-400">{text.length}자</span>
            </div>
          </div>

          {/* 안내 */}
          <div className="mt-3 p-3 rounded-xl bg-slate-50 flex items-start gap-2">
            <Icon name="info" size={13} className="text-slate-500 shrink-0 mt-0.5" />
            <div className="text-[11px] text-slate-600 leading-relaxed">
              FOO 메신저로 전송되며 지원자에게 푸시 알림이 갑니다. 응답이 없을 경우 24시간 뒤 자동으로 리마인드돼요.
            </div>
          </div>
        </div>

        {/* 푸터 */}
        <div className="p-5 border-t border-slate-100 flex justify-end gap-2">
          <Btn variant="ghost" onClick={onClose}>취소</Btn>
          <Btn variant="brand" icon="chat" onClick={() => onSend(text)} disabled={!text.trim()}>전송</Btn>
        </div>
      </div>
    </div>
  );
};
